name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t docker-cicd-app .

      - name: Run container
        run: docker run -d -p 3000:3000 docker-cicd-app

      - name: Test app
        run: |
          sleep 5
          curl http://localhost:3000/health