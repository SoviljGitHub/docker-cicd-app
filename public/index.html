<!DOCTYPE html>
<html>
<head>
  <title>Task App</title>
</head>
<body>

  <h1>🚀 Docker Task App</h1>

  <input id="taskInput" placeholder="Unesi task">
  <button onclick="addTask()">Dodaj</button>

  <ul id="taskList"></ul>

  <script>
    const API = "http://localhost:3000";

    async function loadTasks() {
      const res = await fetch(API + "/tasks");
      const tasks = await res.json();

      const list = document.getElementById("taskList");
      list.innerHTML = "";

      tasks.forEach(t => {
        const li = document.createElement("li");
        li.id = "task-" + t._id;

        li.innerHTML = `
          <span>${t.title}</span>
          <button onclick="startEdit('${t._id}', '${t.title}')">✏️</button>
          <button onclick="deleteTask('${t._id}')">❌</button>
        `;

        list.appendChild(li);
      });
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const title = input.value;

      if (!title) return;

      await fetch(API + "/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title })
      });

      input.value = "";
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(API + "/tasks/" + id, {
        method: "DELETE"
      });

      loadTasks();
    }

    // 🔥 INLINE EDIT START
    function startEdit(id, oldTitle) {
      const li = document.getElementById("task-" + id);

      li.innerHTML = `
        <input id="edit-${id}" value="${oldTitle}" />
        <button onclick="saveEdit('${id}')">✔</button>
        <button onclick="loadTasks()">❌</button>
      `;
    }

    async function saveEdit(id) {
      const newTitle = document.getElementById("edit-" + id).value;

      if (!newTitle) return;

      await fetch(API + "/tasks/" + id, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ title: newTitle }),
      });

      loadTasks();
    }

    loadTasks();
  </script>

</body>
</html>
