<!DOCTYPE html>
<html>
<head>
  <title>Task App PRO</title>

  <style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .topbar {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  input, select, button {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
  }

  input {
    flex: 1;
  }

  button {
    background: #667eea;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background: #5a67d8;
  }

  .task-group {
    margin-top: 20px;
  }

  .task-group h3 {
    border-bottom: 1px solid #eee;
    padding-bottom: 5px;
  }

  .card {
    background: #f9f9f9;
    padding: 10px;
    margin-top: 8px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .completed {
    text-decoration: line-through;
    opacity: 0.5;
  }

  .high { border-left: 5px solid red; }
  .medium { border-left: 5px solid orange; }
  .low { border-left: 5px solid green; }

  #search {
    width: 100%;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="container">

<h1>Task App PRO</h1>

<div class="topbar">
  <input id="taskInput" placeholder="Unesi task">

  <select id="category">
    <option>General</option>
    <option>Work</option>
    <option>School</option>
  </select>

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium">Medium</option>
    <option value="high">High</option>
  </select>

  <button onclick="addTask()">Dodaj</button>
</div>

<input id="search" placeholder="Pretraga..." oninput="loadTasks()">

<div id="taskList"></div>

<div id="stats"></div>

</div>

<script src="app.js"></script>

</body>
</html>
